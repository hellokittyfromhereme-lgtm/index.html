<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flag Arena Battle</title>
<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
    }
    #controls {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        text-align: center;
        color: white;
    }
    #controls button, #controls select {
        padding: 8px 12px;
        margin: 0 8px;
        font-size: 16px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
    }
    #info {
        margin-top: 10px;
        font-size: 20px;
        font-weight: bold;
        color: yellow;
    }
    canvas {
        display: block;
    }
</style>
</head>
<body>

<div id="controls">
    <select id="duration">
        <option value="0.5">30 Minutes</option>
        <option value="1">1 Hour</option>
        <option value="2">2 Hours</option>
    </select>
    <button onclick="startBattle()">Start</button>
    <button onclick="resetBattle()">Reset</button>
    <div id="info">Choose duration and press Start</div>
</div>

<canvas id="arena"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
// ==== SETUP ====

const { Engine, Render, Runner, World, Bodies, Body, Events } = Matter;

const canvas = document.getElementById("arena");
const info   = document.getElementById("info");
const durationSelect = document.getElementById("duration");

// full screen canvas
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

// engine
const engine = Engine.create();
const world  = engine.world;
world.gravity.y = 0;  // no gravity

// arena circle
const centerX = canvas.width/2;
const centerY = canvas.height/2;
const radius  = Math.min(canvas.width, canvas.height) / 2 - 50;

// create bounding circle
const circleWall = Bodies.circle(centerX, centerY, radius, {
    isStatic: true,
    render: { visible: false }
});
World.add(world, circleWall);

// particle background effect
function createBGParticles(){
    for(let i=0; i<100; i++){
        let p = Bodies.circle(Math.random()*canvas.width, Math.random()*canvas.height, 1,{
            isStatic:true,
            render:{ fillStyle:"#555"}
        });
        World.add(world, p);
    }
}
createBGParticles();

// ==== FLAGS ====

const countries = [
    {name:"Bangladesh", img:"https://flagcdn.com/w80/bd.png"},
    {name:"USA",       img:"https://flagcdn.com/w80/us.png"},
    {name:"UK",        img:"https://flagcdn.com/w80/gb.png"},
    {name:"India",     img:"https://flagcdn.com/w80/in.png"},
    {name:"Japan",     img:"https://flagcdn.com/w80/jp.png"},
    {name:"France",    img:"https://flagcdn.com/w80/fr.png"},
    {name:"Germany",   img:"https://flagcdn.com/w80/de.png"},
];

let flagBodies = [];

function spawnFlags(){
    flagBodies.forEach(b => World.remove(world, b));
    flagBodies = [];

    countries.forEach(c => {
        let x = centerX + (Math.random()-0.5)*radius*0.6;
        let y = centerY + (Math.random()-0.5)*radius*0.6;
        let b = Bodies.circle(x, y, 25, {
            restitution: 1,
            friction: 0,
            frictionAir: 0.02,
            render: {
                sprite: { texture: c.img, xScale: 0.6, yScale: 0.6 }
            }
        });
        Body.setVelocity(b, {x: (Math.random()-0.5)*10, y: (Math.random()-0.5)*10});
        flagBodies.push(b);
        World.add(world, b);
    });
}

// ==== RENDER ====

const render = Render.create({
    canvas: canvas,
    engine: engine,
    options: {
        width: canvas.width,
        height: canvas.height,
        wireframes: false,
        background: "#000"
    }
});
Render.run(render);

const runner = Runner.create();
Runner.run(runner, engine);

// ==== COLLISION CONTROL ====

Events.on(engine, "beforeUpdate", function(){
    flagBodies.forEach(f => {
        let dx = f.position.x - centerX;
        let dy = f.position.y - centerY;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if(dist > radius - 30){
            // push back inside
            let angle = Math.atan2(dy, dx);
            Body.setPosition(f, {
                x: centerX + Math.cos(angle)*(radius-30),
                y: centerY + Math.sin(angle)*(radius-30)
            });
            // reflect velocity
            Body.setVelocity(f, {
                x: -f.velocity.x,
                y: -f.velocity.y
            });
        }
    });
});

// ==== GAME LOOP ====

let battleTimer = null;

function startBattle(){
    info.innerHTML = "Battle Started! 🛡️";
    spawnFlags();

    // set timer
    let hours = parseFloat(durationSelect.value);
    let ms = hours * 60 * 60 * 1000;

    if(battleTimer) clearTimeout(battleTimer);

    battleTimer = setTimeout(() => {
        info.innerHTML = "Time's Up! ⏳ Battle Ended";
    }, ms);
}

function resetBattle(){
    if(battleTimer) clearTimeout(battleTimer);
    info.innerHTML = "Reset Done! Choose duration & Start";
    flagBodies.forEach(b => World.remove(world, b));
    flagBodies = [];
}

</script>
</body>
</html>
