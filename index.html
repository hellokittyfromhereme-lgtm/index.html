<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Flag Arena Battle Final</title>
<style>
body { margin:0; overflow:hidden; background:#0a0f2c; font-family:Arial; }
#controls { position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:10; color:white; text-align:center; }
#controls button, #controls select, #controls input { padding:8px 12px; margin:0 5px; font-size:16px; border-radius:6px; border:none; cursor:pointer; }
#info { margin-top:8px; font-size:20px; font-weight:bold; color:yellow; }
canvas { display:block; }
</style>
</head>
<body>

<div id="controls">
    <input id="countryInput" placeholder="Type country names comma separated, e.g. Bangladesh,USA,India" size="50">
    <select id="duration">
        <option value="0.5">30 Minutes</option>
        <option value="1">1 Hour</option>
        <option value="2">2 Hours</option>
    </select>
    <button onclick="startBattle()">Start</button>
    <button onclick="resetBattle()">Reset</button>
    <div id="info">Enter countries & press Start</div>
</div>

<canvas id="arena"></canvas>

<script>
const canvas=document.getElementById('arena');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const centerX=canvas.width/2;
const centerY=canvas.height/2;
const arenaRadius=Math.min(canvas.width,canvas.height)/2-150;

// PARTICLE BACKGROUND
const particles=[];
for(let i=0;i<200;i++){
    particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*3+1,dx:(Math.random()-0.5)/1.5,dy:(Math.random()-0.5)/1.5});
}

// COUNTRY FLAGS IMAGE DATABASE
const countryFlags={
    "Bangladesh":"https://flagcdn.com/w80/bd.png",
    "USA":"https://flagcdn.com/w80/us.png",
    "UK":"https://flagcdn.com/w80/gb.png",
    "India":"https://flagcdn.com/w80/in.png",
    "Japan":"https://flagcdn.com/w80/jp.png",
    "France":"https://flagcdn.com/w80/fr.png",
    "Germany":"https://flagcdn.com/w80/de.png",
    "Canada":"https://flagcdn.com/w80/ca.png",
    "Thailand":"https://flagcdn.com/w80/th.png",
    "Pakistan":"https://flagcdn.com/w80/pk.png",
    "Oman":"https://flagcdn.com/w80/om.png",
    "Tunisia":"https://flagcdn.com/w80/tn.png",
    "Uzbekistan":"https://flagcdn.com/w80/uz.png",
    "Sri Lanka":"https://flagcdn.com/w80/lk.png",
    "Yemen":"https://flagcdn.com/w80/ye.png",
    "Congo":"https://flagcdn.com/w80/cd.png",
    "Eswatini":"https://flagcdn.com/w80/sz.png",
    "Morocco":"https://flagcdn.com/w80/ma.png",
    "Nigeria":"https://flagcdn.com/w80/ng.png",
    "UAE":"https://flagcdn.com/w80/ae.png"
};

// FLAG CLASS
class Flag{
    constructor(name,img){
        this.name=name;
        this.img=new Image();
        this.img.src=img;
        this.radius=25;
        this.health=100;
        // circular arena spawn
        let angle=Math.random()*Math.PI*2;
        let r=Math.random()*(arenaRadius*0.6);
        this.x=centerX+Math.cos(angle)*r;
        this.y=centerY+Math.sin(angle)*r;
        this.vx=(Math.random()-0.5)*2.5;
        this.vy=(Math.random()-0.5)*2.5;
        this.swordAngle=0;
        this.swinging=false;
    }
    draw(){
        // health bar
        ctx.fillStyle='red';
        ctx.fillRect(this.x-20,this.y+30,40*this.health/100,5);

        // flag circle
        ctx.save();
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(this.img,this.x-this.radius,this.y-this.radius,this.radius*2,this.radius*2);
        ctx.restore();

        // sword
        if(this.swinging){
            ctx.save();
            ctx.translate(this.x,this.y);
            ctx.rotate(this.swordAngle);
            ctx.strokeStyle='silver';
            ctx.lineWidth=3;
            ctx.beginPath();
            ctx.moveTo(0,0);
            ctx.lineTo(0,-this.radius-15);
            ctx.stroke();
            ctx.restore();
        }
    }
    update(){
        this.x+=this.vx;
        this.y+=this.vy;

        // arena circular boundary
        let dx=this.x-centerX;
        let dy=this.y-centerY;
        let dist=Math.sqrt(dx*dx+dy*dy);
        if(dist+this.radius>arenaRadius){
            let angle=Math.atan2(dy,dx);
            this.x=centerX+Math.cos(angle)*(arenaRadius-this.radius);
            this.y=centerY+Math.sin(angle)*(arenaRadius-this.radius);
            this.vx=-this.vx;
            this.vy=-this.vy;
        }

        // sword swing animation
        if(this.swinging)this.swordAngle+=0.4;
        if(this.swordAngle>Math.PI/2)this.swinging=false;
    }
}

// FLAGS ARRAY
let flags=[];

// COLLISION HANDLER
function handleCollisions(){
    for(let i=0;i<flags.length;i++){
        for(let j=i+1;j<flags.length;j++){
            let f1=flags[i],f2=flags[j];
            let dx=f2.x-f1.x;
            let dy=f2.y-f1.y;
            let dist=Math.sqrt(dx*dx+dy*dy);
            if(dist<f1.radius+f2.radius){
                // elastic collision
                let angle=Math.atan2(dy,dx);
                let targetX=f1.x+Math.cos(angle)*(f1.radius+f2.radius);
                let targetY=f1.y+Math.sin(angle)*(f1.radius+f2.radius);
                let ax=(targetX-f2.x)*0.05;
                let ay=(targetY-f2.y)*0.05;
                f1.vx-=ax; f1.vy-=ay;
                f2.vx+=ax; f2.vy+=ay;

                // sword swing + health decrease
                f1.swinging=true; f2.swinging=true;
                f1.health-=Math.random()*5+2;
                f2.health-=Math.random()*5+2;
                // sword sound
                if(dist<f1.radius/2){
                    const audio=new Audio('https://freesound.org/data/previews/102/102572_634166-lq.mp3');
                    audio.volume=0.2; audio.play();
                }
            }
        }
    }
}

// DRAW LOOP
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // background blur blue
    ctx.fillStyle='rgba(10,15,44,0.3)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // particles
    for(let p of particles){
        p.x+=p.dx; p.y+=p.dy;
        if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;
        if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;
        ctx.fillStyle='rgba(100,150,255,0.3)';
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    }

    // arena circle snake-like bold
    ctx.strokeStyle='rgba(255,255,255,0.3)';
    ctx.lineWidth=8;
    ctx.beginPath();
    ctx.arc(centerX,centerY,arenaRadius,0,Math.PI*2); ctx.stroke();

    // update flags
    for(let f of flags) f.update();
    handleCollisions();
    for(let f of flags) f.draw();

    // remove dead flags
    flags=flags.filter(f=>f.health>0);

    requestAnimationFrame(draw);
}
draw();

// GAME CONTROL
let battleTimeout=null;
function startBattle(){
    // parse input
    const input=document.getElementById("countryInput").value;
    let names=input.split(',').map(n=>n.trim()).filter(n=>countryFlags[n]);
    if(names.length===0) names=Object.keys(countryFlags).slice(0,25); // default 25
    flags=names.map(n=>new Flag(n,countryFlags[n]));
    document.getElementById("info").innerHTML="Battle Started! ⚔️";

    let hours=parseFloat(document.getElementById("duration").value);
    if(battleTimeout) clearTimeout(battleTimeout);
    battleTimeout=setTimeout(()=>{ document.getElementById("info").innerHTML="Time's Up! ⏳"; }, hours*60*60*1000);
}
function resetBattle(){
    if(battleTimeout) clearTimeout(battleTimeout);
    flags=[]; document.getElementById("info").innerHTML="Reset Done! Choose countries & Start";
}
</script>
</body>
</html>
