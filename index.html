<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Epic Flag War</title>
<style>
body { margin:0; overflow:hidden; background:#0a0f2c; font-family:Arial; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="arena"></canvas>

<script>
const canvas=document.getElementById('arena');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const screenWidth=canvas.width, screenHeight=canvas.height;

// Country Flags 100–150
const countryFlags={
"Bangladesh":"https://flagcdn.com/w80/bd.png","USA":"https://flagcdn.com/w80/us.png","UK":"https://flagcdn.com/w80/gb.png",
"India":"https://flagcdn.com/w80/in.png","Japan":"https://flagcdn.com/w80/jp.png","France":"https://flagcdn.com/w80/fr.png",
"Germany":"https://flagcdn.com/w80/de.png","Canada":"https://flagcdn.com/w80/ca.png","Thailand":"https://flagcdn.com/w80/th.png",
"Pakistan":"https://flagcdn.com/w80/pk.png","Oman":"https://flagcdn.com/w80/om.png","Tunisia":"https://flagcdn.com/w80/tn.png",
"Uzbekistan":"https://flagcdn.com/w80/uz.png","Sri Lanka":"https://flagcdn.com/w80/lk.png","Yemen":"https://flagcdn.com/w80/ye.png",
"Congo":"https://flagcdn.com/w80/cd.png","Eswatini":"https://flagcdn.com/w80/sz.png","Morocco":"https://flagcdn.com/w80/ma.png",
"Nigeria":"https://flagcdn.com/w80/ng.png","UAE":"https://flagcdn.com/w80/ae.png","Brazil":"https://flagcdn.com/w80/br.png",
"Argentina":"https://flagcdn.com/w80/ar.png","Chile":"https://flagcdn.com/w80/cl.png","Mexico":"https://flagcdn.com/w80/mx.png",
"Israel":"https://flagcdn.com/w80/il.png","Iran":"https://flagcdn.com/w80/ir.png","China":"https://flagcdn.com/w80/cn.png",
"Russia":"https://flagcdn.com/w80/ru.png","Italy":"https://flagcdn.com/w80/it.png","Spain":"https://flagcdn.com/w80/es.png",
"South Korea":"https://flagcdn.com/w80/kr.png","North Korea":"https://flagcdn.com/w80/kp.png"
};

// Flags array
let flags=[];

// Flag class
class Flag{
constructor(name,img){
this.name=name;
this.img=new Image(); this.img.src=img;
this.radius=40; // flag size
this.maxHealth=100; this.health=this.maxHealth;
this.x=Math.random()*screenWidth;
this.y=Math.random()*screenHeight;
this.vx=(Math.random()-0.5)*0.3;
this.vy=(Math.random()-0.5)*0.3;
this.swordAngle=Math.PI/4;
}
draw(){
ctx.fillStyle='red';
ctx.fillRect(this.x-30,this.y+45,60*this.health/this.maxHealth,6);
ctx.save();
ctx.beginPath();
ctx.arc(this.x,this.y,this.radius,0,Math.PI*2); ctx.closePath(); ctx.clip();
ctx.drawImage(this.img,this.x-this.radius,this.y-this.radius,this.radius*2,this.radius*2);
ctx.restore();
ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.swordAngle);
ctx.strokeStyle='silver'; ctx.lineWidth=6;
ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-this.radius-35); ctx.stroke();
ctx.restore();
}
update(){
this.x+=this.vx; this.y+=this.vy;
if(this.x<this.radius||this.x>screenWidth-this.radius)this.vx*=-1;
if(this.y<this.radius||this.y>screenHeight-this.radius)this.vy*=-1;
this.swordAngle=Math.PI/4 + Math.sin(Date.now()/500)/10;
}
}

// Collisions
function handleCollisions(){
for(let i=0;i<flags.length;i++){
for(let j=i+1;j<flags.length;j++){
let f1=flags[i],f2=flags[j];
let dx=f2.x-f1.x, dy=f2.y-f1.y;
let dist=Math.sqrt(dx*dx+dy*dy);
if(dist<f1.radius+f2.radius){
let angle=Math.atan2(dy,dx);
let targetX=f1.x+Math.cos(angle)*(f1.radius+f2.radius);
let targetY=f1.y+Math.sin(angle)*(f1.radius+f2.radius);
let ax=(targetX-f2.x)*0.01, ay=(targetY-f2.y)*0.01;
f1.vx-=ax; f1.vy-=ay; f2.vx+=ax; f2.vy+=ay;
f1.health-=0.005; f2.health-=0.005;
}
}
}
}

// Cinematic background (smooth blurred snake-wave)
let bgOffset=0;
function drawBackground(){
ctx.fillStyle='rgba(10,15,44,1)';
ctx.fillRect(0,0,screenWidth,screenHeight);
ctx.fillStyle='rgba(20,30,80,0.2)';
for(let i=0;i<20;i++){
let y=(i*100 + bgOffset)%screenHeight;
ctx.beginPath(); ctx.arc(screenWidth/2, y, 200 + Math.sin(bgOffset/100+i)*50, 0, Math.PI*2);
ctx.fill();
}
bgOffset+=0.5;
}

// Draw loop
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
drawBackground();
for(let f of flags){ f.update(); }
handleCollisions();
for(let f of flags){ f.draw(); }
requestAnimationFrame(draw);
}
draw();

// Initialize 100–150 flags, auto 2 hours
function startAutoBattle(){
let allCountries=Object.keys(countryFlags);
let selected=allCountries.slice(0,150);
flags=selected.map(n=>new Flag(n,countryFlags[n]));
setTimeout(()=>{ console.log("2-hour battle complete"); },2*60*60*1000);
}
startAutoBattle();
</script>
</body>
</html>
